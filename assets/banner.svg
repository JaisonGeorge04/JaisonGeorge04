<svg width="1200" height="500"
viewBox="0 0 1200 500"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="goldMetal" x1="0" y1="0" x2="1" y2="1">

<stop offset="0%" stop-color="#fff7b0"/>
<stop offset="20%" stop-color="#ffd700"/>
<stop offset="45%" stop-color="#b8860b"/>
<stop offset="70%" stop-color="#ffe88a"/>
<stop offset="100%" stop-color="#8a6508"/>

</linearGradient>


<radialGradient id="darkBg">

<stop offset="0%" stop-color="#211600"/>
<stop offset="45%" stop-color="#090909"/>
<stop offset="100%" stop-color="#000000"/>

</radialGradient>


<filter id="textShadow">

<feDropShadow
dx="0"
dy="12"
stdDeviation="10"
flood-color="#000000"/>

</filter>


<linearGradient id="shine">

<stop offset="0%" stop-color="transparent"/>
<stop offset="50%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="transparent"/>

</linearGradient>


</defs>



<!-- Background -->

<rect width="1200"
height="500"
rx="35"
fill="url(#darkBg)"/>



<!-- Outer Frame -->

<rect x="20"
y="20"
width="1160"
height="460"
rx="35"
fill="none"
stroke="#d4af37"
stroke-width="3"/>



<!-- Inner Frame -->

<rect x="35"
y="35"
width="1130"
height="430"
rx="30"
fill="none"
stroke="#6f5200"
stroke-width="1"/>



<!-- Circuit Corners -->

<g stroke="#d4af37"
stroke-width="3"
fill="none">


<path d="M70 120 H250 V70"/>

<path d="M950 70 V120 H1130"/>

<path d="M70 380 H250 V430"/>

<path d="M950 430 V380 H1130"/>


</g>




<!-- Name Shadow -->

<text
x="600"
y="190"
text-anchor="middle"
font-family="Arial Black, Arial"
font-size="110"
font-weight="900"
fill="#4d3200">

JAISON GEORGE

</text>




<!-- Main Gold Name -->

<text
x="600"
y="175"
text-anchor="middle"
font-family="Arial Black, Arial"
font-size="110"
font-weight="900"
fill="url(#goldMetal)"
filter="url(#textShadow)">

JAISON GEORGE


<animate
attributeName="opacity"
values="0.85;1;0.85"
dur="3s"
repeatCount="indefinite"/>


</text>



<!-- Moving Shine -->

<rect
x="-300"
y="70"
width="220"
height="180"
fill="url(#shine)"
opacity="0.25">


<animate
attributeName="x"
from="-300"
to="1300"
dur="5s"
repeatCount="indefinite"/>

</rect>
    <!-- Developer Role -->

<text
x="600"
y="260"
text-anchor="middle"
font-family="Arial"
font-size="34"
font-weight="700"
fill="#ffffff">

SOFTWARE DEVELOPER | AI ENGINEER | CLOUD &amp; DEVOPS

</text>




<!-- Premium Overlapping Technology Circles -->

<g transform="translate(170,320)"
font-family="Arial"
text-anchor="middle">


<!-- Python -->

<g>

<circle cx="50"
cy="35"
r="42"
fill="#3776AB"
stroke="#ffd700"
stroke-width="3"/>

<text
x="50"
y="43"
font-size="26"
font-weight="bold"
fill="white">
Py
</text>

<text
x="50"
y="105"
font-size="17"
fill="#ffd700">
Python
</text>

</g>



<!-- AWS -->

<g transform="translate(130,0)">

<circle cx="50"
cy="35"
r="42"
fill="#232F3E"
stroke="#ff9900"
stroke-width="3"/>

<text
x="50"
y="40"
font-size="20"
font-weight="bold"
fill="#ff9900">
AWS
</text>

<text
x="50"
y="105"
font-size="17"
fill="#ffd700">
Cloud
</text>

</g>



<!-- Docker -->

<g transform="translate(260,0)">

<circle cx="50"
cy="35"
r="42"
fill="#2496ED"
stroke="white"
stroke-width="3"/>

<text
x="50"
y="43"
font-size="24"
font-weight="bold"
fill="white">
◆
</text>

<text
x="50"
y="105"
font-size="17"
fill="#ffd700">
Docker
</text>

</g>



<!-- Terraform -->

<g transform="translate(390,0)">

<circle cx="50"
cy="35"
r="42"
fill="#7B42BC"
stroke="white"
stroke-width="3"/>

<text
x="50"
y="45"
font-size="32"
font-weight="bold"
fill="white">
T
</text>

<text
x="50"
y="105"
font-size="17"
fill="#ffd700">
Terraform
</text>

</g>



<!-- Jenkins -->

<g transform="translate(520,0)">

<circle cx="50"
cy="35"
r="42"
fill="#D24939"
stroke="white"
stroke-width="3"/>

<text
x="50"
y="45"
font-size="32"
font-weight="bold"
fill="white">
J
</text>

<text
x="50"
y="105"
font-size="17"
fill="#ffd700">
Jenkins
</text>

</g>



<!-- AI -->

<g transform="translate(650,0)">

<circle cx="50"
cy="35"
r="42"
fill="#050505"
stroke="#ffd700"
stroke-width="3"/>

<text
x="50"
y="43"
font-size="24"
font-weight="bold"
fill="#ffd700">
AI
</text>

<text
x="50"
y="105"
font-size="17"
fill="#ffd700">
AI/ML
</text>

</g>


</g>



<!-- Bottom Message -->

<text
x="600"
y="465"
text-anchor="middle"
font-family="monospace"
font-size="22"
letter-spacing="4"
fill="#d4af37">

BUILD • DEPLOY • INNOVATE

</text>




<!-- Floating Gold Particles -->

<g fill="#ffd700">


<circle cx="260" cy="90" r="4">

<animate
attributeName="cy"
values="90;60;90"
dur="3s"
repeatCount="indefinite"/>

</circle>



<circle cx="930" cy="100" r="3">

<animate
attributeName="cy"
values="100;65;100"
dur="4s"
repeatCount="indefinite"/>

</circle>



<circle cx="1050" cy="240" r="4">

<animate
attributeName="cy"
values="240;200;240"
dur="3s"
repeatCount="indefinite"/>

</circle>



<circle cx="150" cy="250" r="3">

<animate
attributeName="cy"
values="250;210;250"
dur="4s"
repeatCount="indefinite"/>

</circle>


</g>





<!-- Moving Gold Light Beam -->

<rect
x="-250"
y="0"
width="180"
height="500"
fill="#ffffff"
opacity="0.08">


<animate
attributeName="x"
from="-250"
to="1300"
dur="5s"
repeatCount="indefinite"/>


</rect>





<!-- Icon Glow Rings -->

<g
fill="none"
stroke="#ffd700"
stroke-width="2">


<circle cx="160" cy="355" r="45">

<animate
attributeName="r"
values="45;50;45"
dur="3s"
repeatCount="indefinite"/>

</circle>



<circle cx="330" cy="355" r="45">

<animate
attributeName="r"
values="45;50;45"
dur="3.2s"
repeatCount="indefinite"/>

</circle>



<circle cx="500" cy="355" r="45">

<animate
attributeName="r"
values="45;50;45"
dur="3.4s"
repeatCount="indefinite"/>

</circle>



<circle cx="670" cy="355" r="45">

<animate
attributeName="r"
values="45;50;45"
dur="3.6s"
repeatCount="indefinite"/>

</circle>



<circle cx="840" cy="355" r="45">

<animate
attributeName="r"
values="45;50;45"
dur="3.8s"
repeatCount="indefinite"/>

</circle>



<circle cx="1010" cy="355" r="45">

<animate
attributeName="r"
values="45;50;45"
dur="4s"
repeatCount="indefinite"/>

</circle>


</g>




</svg>
