<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fff7b0"/>
    <stop offset="25%" stop-color="#ffd700"/>
    <stop offset="50%" stop-color="#b8860b"/>
    <stop offset="75%" stop-color="#ffdf70"/>
    <stop offset="100%" stop-color="#8a6508"/>
</linearGradient>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#050505"/>
    <stop offset="0.5" stop-color="#111111"/>
    <stop offset="1" stop-color="#020202"/>
</linearGradient>

<filter id="shadow">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000"/>
</filter>

<linearGradient id="shine">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="50%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="transparent"/>
</linearGradient>

</defs>


<!-- Background -->

<rect width="1200" height="400" rx="25" fill="url(#bg)"/>


<!-- Border -->

<rect x="15" y="15" width="1170" height="370" rx="20"
stroke="#d4af37"
stroke-width="2"/>


<!-- Circuit Lines -->

<path d="M50 80 H250 V50" stroke="#d4af37" stroke-width="2"/>
<path d="M950 50 V80 H1150" stroke="#d4af37" stroke-width="2"/>

<path d="M50 320 H250 V350" stroke="#d4af37" stroke-width="2"/>
<path d="M950 350 V320 H1150" stroke="#d4af37" stroke-width="2"/>



<!-- Name -->

<text x="600"
y="170"
text-anchor="middle"
font-family="Arial"
font-size="90"
font-weight="900"
fill="url(#gold)"
filter="url(#shadow)">
JAISON GEORGE
</text>



<!-- Moving Gold Shine -->

<rect x="-300"
y="70"
width="250"
height="120"
fill="url(#shine)"
opacity="0.35">

<animate
attributeName="x"
from="-300"
to="1300"
dur="4s"
repeatCount="indefinite"/>

</rect>



<!-- Role -->

<text x="600"
y="245"
text-anchor="middle"
font-family="Arial"
font-size="30"
font-weight="700"
fill="#ffffff">

SOFTWARE DEVELOPER | AI ENGINEER | CLOUD &amp; DEVOPS

</text>



<!-- Technologies -->

<text x="600"
y="305"
text-anchor="middle"
font-family="monospace"
font-size="24"
fill="#d4af37">

Python • AWS • Docker • Terraform • Jenkins • AI/ML

</text>



<!-- Bottom Glow Line -->

<line x1="250"
y1="340"
x2="950"
y2="340"
stroke="#d4af37"
stroke-width="3">

<animate
attributeName="stroke-width"
values="3;8;3"
dur="2s"
repeatCount="indefinite"/>

</line>


</svg>
