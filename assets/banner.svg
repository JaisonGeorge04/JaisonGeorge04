<svg width="1200" height="400"
viewBox="0 0 1200 400"
xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Premium Gold -->
<linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">

<stop offset="0%" stop-color="#fff8c4"/>
<stop offset="25%" stop-color="#ffd700"/>
<stop offset="50%" stop-color="#b8860b"/>
<stop offset="75%" stop-color="#ffe88a"/>
<stop offset="100%" stop-color="#8a6508"/>

</linearGradient>


<!-- Dark futuristic background -->

<radialGradient id="bg">

<stop offset="0%" stop-color="#211600"/>
<stop offset="45%" stop-color="#0c0c0c"/>
<stop offset="100%" stop-color="#020202"/>

</radialGradient>


<!-- Glow -->

<filter id="glow">

<feGaussianBlur stdDeviation="5"/>

</filter>


<!-- Text shadow -->

<filter id="shadow">

<feDropShadow
dx="0"
dy="10"
stdDeviation="8"
flood-color="#000000"/>

</filter>


<!-- Shine -->

<linearGradient id="shine">

<stop offset="0%" stop-color="transparent"/>
<stop offset="50%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="transparent"/>

</linearGradient>


</defs>



<!-- Background -->

<rect width="1200"
height="400"
rx="30"
fill="url(#bg)"/>



<!-- Outer Frame -->

<rect x="20"
y="20"
width="1160"
height="360"
rx="25"
fill="none"
stroke="#d4af37"
stroke-width="3"/>



<!-- Circuit Decoration -->

<g stroke="#d4af37" stroke-width="3" fill="none">


<path d="M60 100 H240 V60"/>

<path d="M960 60 V100 H1140"/>

<path d="M60 300 H240 V340"/>

<path d="M960 340 V300 H1140"/>


<circle cx="60" cy="100" r="5"/>
<circle cx="1140" cy="100" r="5"/>
<circle cx="60" cy="300" r="5"/>
<circle cx="1140" cy="300" r="5"/>


</g>



<!-- Name shadow -->

<text
x="600"
y="165"
text-anchor="middle"
font-family="Arial"
font-size="95"
font-weight="900"
fill="#5a3b00">

JAISON GEORGE

</text>



<!-- Main 3D Gold Name -->

<text
x="600"
y="150"
text-anchor="middle"
font-family="Arial"
font-size="95"
font-weight="900"
fill="url(#gold)"
filter="url(#shadow)">

JAISON GEORGE


<animate
attributeName="opacity"
values="0.75;1;0.75"
dur="3s"
repeatCount="indefinite"/>

</text>



<!-- Moving light -->

<rect
x="-250"
y="70"
width="200"
height="120"
fill="url(#shine)"
opacity="0.35">

<animate
attributeName="x"
from="-250"
to="1300"
dur="4s"
repeatCount="indefinite"/>

</rect>

    <!-- Developer Role -->

<text
x="600"
y="225"
text-anchor="middle"
font-family="Arial"
font-size="30"
font-weight="700"
fill="#ffffff">

SOFTWARE DEVELOPER | AI ENGINEER | CLOUD &amp; DEVOPS

</text>



<!-- Tech Icon Section -->

<g transform="translate(100,260)"
font-family="Arial"
text-anchor="middle">


<!-- Python -->

<g>

<circle cx="50"
cy="30"
r="35"
fill="#3776AB"
stroke="#ffd700"
stroke-width="2">


<animate
attributeName="r"
values="35;38;35"
dur="3s"
repeatCount="indefinite"/>

</circle>


<text x="50"
y="40"
font-size="24"
font-weight="bold"
fill="white">

Py

</text>


<text x="50"
y="95"
font-size="18"
fill="#ffd700">

Python

</text>

</g>



<!-- AWS -->

<g transform="translate(170,0)">


<circle cx="50"
cy="30"
r="35"
fill="#232F3E"
stroke="#ff9900"
stroke-width="2">


<animate
attributeName="opacity"
values="0.7;1;0.7"
dur="3s"
repeatCount="indefinite"/>

</circle>


<text x="50"
y="38"
font-size="18"
font-weight="bold"
fill="#ff9900">

AWS

</text>


<text x="50"
y="95"
font-size="18"
fill="#ffd700">

Cloud

</text>


</g>




<!-- Docker -->

<g transform="translate(340,0)">


<circle cx="50"
cy="30"
r="35"
fill="#2496ED"
stroke="#ffffff"
stroke-width="2"/>


<text x="50"
y="38"
font-size="22"
font-weight="bold"
fill="white">

◆

</text>


<text x="50"
y="95"
font-size="18"
fill="#ffd700">

Docker

</text>


</g>




<!-- Terraform -->

<g transform="translate(510,0)">


<circle cx="50"
cy="30"
r="35"
fill="#7B42BC"
stroke="#ffffff"
stroke-width="2"/>


<text x="50"
y="40"
font-size="28"
font-weight="bold"
fill="white">

T

</text>


<text x="50"
y="95"
font-size="18"
fill="#ffd700">

Terraform

</text>


</g>




<!-- Jenkins -->

<g transform="translate(680,0)">


<circle cx="50"
cy="30"
r="35"
fill="#D24939"
stroke="#ffffff"
stroke-width="2"/>


<text x="50"
y="40"
font-size="28"
font-weight="bold"
fill="white">

J

</text>


<text x="50"
y="95"
font-size="18"
fill="#ffd700">

Jenkins

</text>


</g>




<!-- AI -->

<g transform="translate(850,0)">


<circle cx="50"
cy="30"
r="35"
fill="#111111"
stroke="#ffd700"
stroke-width="3"/>


<text x="50"
y="40"
font-size="22"
font-weight="bold"
fill="#ffd700">

AI

</text>


<text x="50"
y="95"
font-size="18"
fill="#ffd700">

AI/ML

</text>


</g>


</g>

    <!-- Bottom Energy Line -->

<line
x1="220"
y1="350"
x2="980"
y2="350"
stroke="#ffd700"
stroke-width="4">


<animate
attributeName="stroke-width"
values="4;10;4"
dur="2s"
repeatCount="indefinite"/>


<animate
attributeName="opacity"
values="0.5;1;0.5"
dur="2s"
repeatCount="indefinite"/>


</line>



<!-- Bottom Tagline -->

<text
x="600"
y="385"
text-anchor="middle"
font-family="monospace"
font-size="20"
fill="#d4af37">

BUILD • DEPLOY • INNOVATE

</text>




<!-- Floating Gold Particles -->


<g fill="#ffd700">


<circle cx="300" cy="80" r="3">

<animate
attributeName="cy"
values="80;60;80"
dur="3s"
repeatCount="indefinite"/>

</circle>



<circle cx="900" cy="120" r="3">

<animate
attributeName="cy"
values="120;90;120"
dur="4s"
repeatCount="indefinite"/>

</circle>



<circle cx="1050" cy="220" r="4">

<animate
attributeName="cy"
values="220;180;220"
dur="3s"
repeatCount="indefinite"/>

</circle>



<circle cx="150" cy="200" r="3">

<animate
attributeName="cy"
values="200;160;200"
dur="4s"
repeatCount="indefinite"/>

</circle>


</g>




<!-- Final Glow Sweep -->


<rect
x="-300"
y="0"
width="150"
height="400"
fill="#ffffff"
opacity="0.08">


<animate
attributeName="x"
from="-300"
to="1300"
dur="5s"
repeatCount="indefinite"/>


</rect>



</svg>
